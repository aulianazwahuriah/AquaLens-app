<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Icon: magnifying lens + water wave -->
  <rect x="0" y="2" width="36" height="36" rx="9" fill="#5B5BFF"/>
  <!-- Outer lens -->
  <circle cx="18" cy="18" r="8.5" stroke="white" stroke-width="1.6" stroke-opacity="0.5"/>
  <!-- Inner lens -->
  <circle cx="18" cy="18" r="5" stroke="white" stroke-width="1.6"/>
  <!-- Center dot -->
  <circle cx="18" cy="18" r="1.8" fill="white"/>
  <!-- Handle -->
  <line x1="23.5" y1="23.5" x2="27" y2="27" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Water wave -->
  <path d="M7 32 Q10 30 13 32 Q16 34 19 32 Q22 30 25 32" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.7"/>
  <!-- Wordmark: Aqua + Lens -->
  <text x="46" y="26" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="16" font-weight="800" fill="#1E1E3A" letter-spacing="-0.5">Aqua<tspan fill="#5B5BFF">Lens</tspan></text>
</svg>
